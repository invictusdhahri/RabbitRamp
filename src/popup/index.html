<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RabbitRamp</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 340px; min-height: 200px; background: #0c0d10; }
      @keyframes popup-spin { to { transform: rotate(360deg); } }
      @keyframes rabbitramp-hop {
        0%   { transform: translateY(0)   scaleY(1); }
        40%  { transform: translateY(-5px) scaleY(1.05); }
        100% { transform: translateY(-9px) scaleY(0.95); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
